<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jouer entre amis — Carnet d'anglais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style-shared.css">
<style>
  header{ text-align:center; margin-bottom:28px; }
  .eyebrow{
    font-family:"IBM Plex Mono", monospace;
    letter-spacing:.22em; font-size:11px;
    color:var(--brass-light); text-transform:uppercase; margin-bottom:10px;
  }
  h1{
    font-family:"Special Elite", monospace; font-weight:400;
    font-size:clamp(26px,5vw,38px); margin:0 0 10px; color:#f6efd9; line-height:1.15;
  }
  .home-link{ display:inline-block; margin-top:14px; font-size:12.5px; color:#b9c3d1; }

  /* ---------- paper texture (real grain, not a gradient) ---------- */
  .paper{
    background:
      linear-gradient(var(--paper), var(--paper)),
      repeating-linear-gradient(180deg, transparent 0 39px, rgba(32,41,58,.05) 39px 40px);
    position:relative;
    color:var(--ink);
  }
  .paper::before{
    content:"";
    position:absolute; inset:0;
    background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='180' height='180'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix type='matrix' values='0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0 0.05  0 0 0 0.5 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:180px 180px;
    mix-blend-mode:multiply;
    pointer-events:none;
  }

  .card{
    padding:26px 26px 24px;
    margin-bottom:22px;
    box-shadow:0 14px 26px rgba(0,0,0,.35);
    clip-path:polygon(0.00% 0.00%, 7.14% 0.33%, 14.29% 1.84%, 21.43% 1.30%, 28.57% 1.54%, 35.71% 0.92%, 42.86% 1.66%, 50.00% 1.41%, 57.14% 2.31%, 64.29% 0.55%, 71.43% 0.19%, 78.57% 0.93%, 85.71% 1.91%, 92.86% 0.94%, 100.00% 0.00%, 97.90% 7.14%, 98.86% 14.29%, 99.74% 21.43%, 99.85% 28.57%, 99.00% 35.71%, 99.93% 42.86%, 99.53% 50.00%, 98.17% 57.14%, 99.35% 64.29%, 99.86% 71.43%, 98.45% 78.57%, 99.90% 85.71%, 98.58% 92.86%, 100.00% 100.00%, 92.86% 99.87%, 85.71% 98.95%, 78.57% 97.94%, 71.43% 98.96%, 64.29% 98.21%, 57.14% 97.79%, 50.00% 98.49%, 42.86% 99.84%, 35.71% 99.62%, 28.57% 99.65%, 21.43% 98.76%, 14.29% 100.00%, 7.14% 98.46%, 0.00% 100.00%, 0.29% 92.86%, 0.42% 85.71%, 0.10% 78.57%, 2.30% 71.43%, 1.04% 64.29%, 0.35% 57.14%, 1.85% 50.00%, 0.81% 42.86%, 1.81% 35.71%, 0.52% 28.57%, 1.14% 21.43%, 2.23% 14.29%, 0.35% 7.14%);
  }
  .card h2{
    font-family:"Special Elite", monospace; font-weight:400;
    font-size:18px; margin:0 0 14px; color:var(--ink);
  }
  .card input, .card textarea{
    width:100%; background:transparent;
    border:none; border-bottom:2px solid rgba(32,41,58,.3);
    padding:8px 2px 10px; color:var(--ink); font-family:"IBM Plex Sans", sans-serif;
    font-size:14px; margin-bottom:14px; position:relative; z-index:1;
  }
  .card input:focus, .card textarea:focus{ outline:none; border-bottom-color:var(--blue); }
  .card textarea{ min-height:90px; resize:vertical; }
  .card input::placeholder, .card textarea::placeholder{ color:#8b8060; font-style:italic; }

  .btn-primary{
    font-family:"Special Elite", monospace; font-size:15px; letter-spacing:.03em;
    background:var(--red); color:#fff6ea; border:none;
    padding:14px 20px; width:100%; cursor:pointer;
    clip-path:polygon(0.00% 0.00%, 7.14% 0.44%, 14.29% 3.28%, 21.43% 0.74%, 28.57% 1.68%, 35.71% 1.24%, 42.86% 1.01%, 50.00% 1.66%, 57.14% 1.23%, 64.29% 0.93%, 71.43% 0.37%, 78.57% 0.68%, 85.71% 2.27%, 92.86% 2.10%, 100.00% 0.00%, 97.65% 7.14%, 99.09% 14.29%, 98.29% 21.43%, 99.60% 28.57%, 96.80% 35.71%, 98.82% 42.86%, 99.35% 50.00%, 97.38% 57.14%, 99.66% 64.29%, 98.38% 71.43%, 98.46% 78.57%, 97.56% 85.71%, 99.66% 92.86%, 100.00% 100.00%, 92.86% 96.99%, 85.71% 97.22%, 78.57% 97.81%, 71.43% 97.01%, 64.29% 99.46%, 57.14% 98.10%, 50.00% 99.02%, 42.86% 96.70%, 35.71% 99.61%, 28.57% 98.97%, 21.43% 98.75%, 14.29% 96.74%, 7.14% 97.25%, 0.00% 100.00%, 2.15% 92.86%, 2.68% 85.71%, 1.71% 78.57%, 0.83% 71.43%, 0.22% 64.29%, 2.30% 57.14%, 1.85% 50.00%, 3.20% 42.86%, 3.03% 35.71%, 0.51% 28.57%, 2.81% 21.43%, 0.12% 14.29%, 3.21% 7.14%);
    box-shadow:0 6px 0 #7c2532, 0 10px 16px rgba(0,0,0,.3);
    transition:transform .12s ease, box-shadow .12s ease, filter .15s ease;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:active{ transform:translateY(5px) scale(.98); box-shadow:0 1px 0 #7c2532, 0 3px 6px rgba(0,0,0,.25); }

  .error-box{ color:var(--bad); font-size:13px; min-height:18px; margin-top:8px; }
  .muted{ color:var(--ink-soft); font-size:13px; }

  .postmark{ display:flex; justify-content:center; margin-bottom:8px; }
  .postmark svg{ width:150px; color:var(--red); }
  .postmark-code{ font-family:"IBM Plex Mono", monospace; font-size:24px; font-weight:700; fill:currentColor; letter-spacing:.05em; }
  .postmark-sub{ font-family:"IBM Plex Mono", monospace; font-size:8px; letter-spacing:.14em; fill:currentColor; }

  .player-list{ list-style:none; padding:0; margin:12px 0 18px; }
  .player-list li{
    padding:8px 10px; border-bottom:1px solid rgba(32,41,58,.15); font-size:14px;
  }

  .round-label{
    font-family:"IBM Plex Mono", monospace; font-size:12px; letter-spacing:.06em;
    color:var(--red); text-transform:uppercase; margin-bottom:10px;
  }
  .fr-phrase{
    font-family:"Source Serif 4", serif; font-style:italic; font-size:clamp(20px,3.2vw,26px);
    line-height:1.4; color:var(--ink); margin-bottom:16px;
  }
  .fr-phrase::before{ content:"“"; color:var(--red); font-style:normal; }
  .fr-phrase::after{ content:"”"; color:var(--red); font-style:normal; }
  .timer{
    font-family:"IBM Plex Mono", monospace; font-size:28px; color:var(--red);
    margin-bottom:16px;
  }

  .icebreaker-target{
    font-family:"Special Elite", monospace; font-size:14px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--red); text-align:center; margin-bottom:10px;
  }
  .icebreaker-text{
    font-family:"Source Serif 4", serif; font-style:italic; font-size:clamp(19px,3vw,24px);
    line-height:1.4; color:var(--ink); margin-bottom:16px; text-align:center;
  }
  .icebreaker-hint{
    font-family:"IBM Plex Sans", sans-serif; font-size:12.5px; color:var(--ink-soft);
    text-align:center; margin-bottom:14px;
  }

  .ref-answers{
    background:rgba(32,41,58,.05); border-radius:2px; padding:12px 14px; margin-bottom:14px;
  }
  .ref-answers .label, .player-answer .label{
    font-family:"IBM Plex Mono", monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--blue); display:block; margin-bottom:4px;
  }
  .player-answer{ margin-bottom:10px; }
  .answer-text{ font-size:16px; color:var(--ink); }

  .grade-buttons{ display:flex; gap:10px; }
  .btn-grade{
    font-family:"Special Elite", monospace;
    flex:1; padding:12px 8px; border:none; font-weight:400;
    font-size:14px; cursor:pointer; color:#fff6ea;
    clip-path:polygon(0.00% 0.00%, 7.14% 2.42%, 14.29% 2.09%, 21.43% 0.90%, 28.57% 1.33%, 35.71% 0.93%, 42.86% 1.71%, 50.00% 0.83%, 57.14% 0.93%, 64.29% 0.45%, 71.43% 1.21%, 78.57% 1.51%, 85.71% 1.29%, 92.86% 1.73%, 100.00% 0.00%, 98.71% 7.14%, 99.41% 14.29%, 97.57% 21.43%, 99.96% 28.57%, 98.58% 35.71%, 98.50% 42.86%, 98.82% 50.00%, 98.98% 57.14%, 98.11% 64.29%, 98.85% 71.43%, 97.52% 78.57%, 99.31% 85.71%, 99.22% 92.86%, 100.00% 100.00%, 92.86% 98.05%, 85.71% 98.71%, 78.57% 99.87%, 71.43% 99.88%, 64.29% 98.62%, 57.14% 98.15%, 50.00% 98.10%, 42.86% 97.42%, 35.71% 98.36%, 28.57% 98.95%, 21.43% 99.37%, 14.29% 98.73%, 7.14% 97.56%, 0.00% 100.00%, 2.32% 92.86%, 0.37% 85.71%, 0.16% 78.57%, 0.44% 71.43%, 2.28% 64.29%, 2.14% 57.14%, 1.20% 50.00%, 2.42% 42.86%, 2.11% 35.71%, 2.50% 28.57%, 0.23% 21.43%, 1.35% 14.29%, 0.97% 7.14%);
    box-shadow:0 4px 0 rgba(0,0,0,.3);
    transition:transform .1s ease, box-shadow .1s ease, filter .15s ease;
  }
  .btn-grade:hover{ filter:brightness(1.1); }
  .btn-grade:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.3); }
  .btn-grade.ok{ background:var(--ok); }
  .btn-grade.warn{ background:var(--warn); }
  .btn-grade.bad{ background:var(--bad); }

  .grade-mark{
    font-family:"Caveat", cursive; font-weight:700; font-size:42px;
    text-align:center; margin:6px 0 18px; transform:rotate(-3deg);
    text-decoration:underline wavy; text-decoration-color:currentColor; text-underline-offset:6px;
  }
  .grade-mark.grade-oui{ color:var(--ok); }
  .grade-mark.grade-presque{ color:var(--warn); }
  .grade-mark.grade-non{ color:var(--bad); }

  .leaderboard{ list-style:none; padding:0; margin:0 0 18px; counter-reset:none; }
  .leaderboard li{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 12px; border-bottom:1px solid rgba(32,41,58,.15); font-size:15px;
  }
  .leaderboard .rank{ font-family:"IBM Plex Mono", monospace; color:var(--red); margin-right:10px; }
  .leaderboard .score{ font-weight:600; font-family:"Caveat",cursive; font-size:19px; color:var(--ink); }

  .layout{ display:flex; gap:20px; align-items:flex-start; }
  #app{ flex:1; min-width:0; }
  .chat-panel{
    display:none; flex-direction:column;
    width:260px; flex-shrink:0; height:520px;
    background:rgba(241,233,210,.05); border:1px solid rgba(241,233,210,.15);
    border-radius:var(--radius); padding:16px 16px 12px;
  }
  .chat-panel h2{
    font-family:"Special Elite", monospace; font-weight:400;
    font-size:15px; margin:0 0 10px; color:#f6efd9;
  }
  .chat-messages{ flex:1; overflow-y:auto; margin-bottom:10px; }
  .chat-msg{ font-size:13px; margin-bottom:8px; line-height:1.4; }
  .chat-msg .chat-name{ font-weight:600; color:var(--brass-light); margin-right:5px; }
  .chat-msg.me .chat-name{ color:var(--blue); }
  .chat-msg .chat-text{ color:#e2e6ec; word-break:break-word; }
  .chat-form{ display:flex; gap:6px; }
  .chat-form input{
    flex:1; background:rgba(241,233,210,.08); border:1px solid rgba(241,233,210,.22);
    border-radius:6px; padding:8px 10px; color:var(--paper); font-size:13px;
  }
  .chat-form button{
    background:var(--brass); color:#1c1305; border:none; border-radius:6px;
    padding:8px 12px; font-weight:600; font-size:13px; cursor:pointer;
  }
  @media (max-width:720px){
    .layout{ flex-direction:column; }
    .chat-panel{ width:100%; height:260px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Carnet de traduction — mode multijoueur</div>
    <h1>Jouer entre amis</h1>
    <a class="home-link" href="/">← retour au carnet</a>
  </header>

  <div class="layout">
    <div id="app"></div>
    <aside id="chatPanel" class="chat-panel">
      <h2>Chat</h2>
      <div id="chatMessages" class="chat-messages"></div>
      <form id="chatForm" class="chat-form">
        <input id="chatInput" placeholder="Message…" maxlength="200" autocomplete="off">
        <button type="submit">Envoyer</button>
      </form>
    </aside>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const socket = io();
  const app = document.getElementById('app');
  const STORAGE_KEY = 'kculture-session';

  let me = { code: null, name: null, playerId: null, isHost: false };
  let state = { screen: 'home' };
  let countdownInterval = null;
  let chatMessages = [];

  function saveMe(){ sessionStorage.setItem(STORAGE_KEY, JSON.stringify(me)); }
  function loadMe(){ try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch(e){ return null; } }
  function clearMe(){ sessionStorage.removeItem(STORAGE_KEY); me = { code:null, name:null, playerId:null, isHost:false }; chatMessages = []; }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function postmarkSvg(code){
    const ticks = [];
    for (let i = 0; i < 36; i++){
      const a = (i / 36) * Math.PI * 2;
      const r1 = 78, r2 = i % 3 === 0 ? 68 : 73;
      const x1 = 100 + r1 * Math.cos(a), y1 = 100 + r1 * Math.sin(a);
      const x2 = 100 + r2 * Math.cos(a), y2 = 100 + r2 * Math.sin(a);
      ticks.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="currentColor" stroke-width="2"/>`);
    }
    return `<svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="86" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="100" cy="100" r="62" fill="none" stroke="currentColor" stroke-width="2.5"/>
      ${ticks.join('')}
      <text x="100" y="94" text-anchor="middle" class="postmark-code">${escapeHtml(code)}</text>
      <text x="100" y="118" text-anchor="middle" class="postmark-sub">REJOINS LA PARTIE</text>
    </svg>`;
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    if (box) box.textContent = msg;
  }

  function applySnapshot(snapshot){
    if (!snapshot) return;
    if (snapshot.phase === 'lobby'){
      state = { screen:'lobby', hostName: snapshot.hostName, players: snapshot.players };
    } else if (snapshot.phase === 'question'){
      state = { screen:'question', ...snapshot };
    } else if (snapshot.phase === 'review'){
      state = { screen:'review', ...snapshot };
    } else if (snapshot.phase === 'icebreaker'){
      state = { screen:'icebreaker', ...snapshot };
    } else if (snapshot.phase === 'finished'){
      state = { screen:'finished', leaderboard: snapshot.leaderboard };
    }
    render();
  }

  socket.on('session:update', (payload) => {
    if (state.screen === 'lobby' || state.screen === 'home'){
      state = { screen:'lobby', hostName: payload.hostName, players: payload.players };
      render();
    }
  });

  socket.on('round:start', (payload) => {
    state = { screen:'question', ...payload };
    render();
  });

  socket.on('review:show', (payload) => {
    state = { screen:'review', ...payload };
    render();
  });

  socket.on('icebreaker:show', (payload) => {
    state = { screen:'icebreaker', ...payload };
    render();
  });

  socket.on('review:graded', (payload) => {
    if (state.screen === 'review' && state.roundIndex === payload.roundIndex && state.playerId === payload.playerId){
      state.grade = payload.grade;
      state.points = payload.points;
      render();
    }
  });

  socket.on('game:finished', (payload) => {
    state = { screen:'finished', leaderboard: payload.leaderboard };
    render();
  });

  socket.on('chat:message', (msg) => {
    chatMessages.push(msg);
    renderChatMessages();
  });

  function renderChatMessages(){
    const box = document.getElementById('chatMessages');
    if (!box) return;
    box.innerHTML = chatMessages.map(m => `
      <div class="chat-msg${m.playerId === me.playerId ? ' me' : ''}">
        <span class="chat-name">${escapeHtml(m.name)}</span>
        <span class="chat-text">${escapeHtml(m.text)}</span>
      </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
  }

  document.getElementById('chatForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !me.code) return;
    socket.emit('chat:send', { code: me.code, text }, (res) => {
      if (res && res.error) showError(res.error);
    });
    input.value = '';
  });

  function render(){
    clearInterval(countdownInterval);
    document.getElementById('chatPanel').style.display = (state.screen === 'home') ? 'none' : 'flex';
    renderChatMessages();
    const carnetAllowed = (state.screen === 'question' || state.screen === 'review')
      ? state.carnetEnabled !== false
      : true;
    if (window.CarnetWidget && window.CarnetWidget.setEnabled) window.CarnetWidget.setEnabled(carnetAllowed);
    if (state.screen === 'home') renderHome();
    else if (state.screen === 'lobby') renderLobby();
    else if (state.screen === 'question') renderQuestion();
    else if (state.screen === 'review') renderReview();
    else if (state.screen === 'icebreaker') renderIcebreaker();
    else if (state.screen === 'finished') renderFinished();
  }

  function renderHome(){
    app.innerHTML = `
      <div class="card paper">
        <h2>Créer une partie</h2>
        <input id="hostNameInput" placeholder="Ton pseudo (chef de partie)">
        <button id="createBtn" class="btn-primary">Créer</button>
      </div>
      <div class="card paper">
        <h2>Rejoindre une partie</h2>
        <input id="joinCodeInput" placeholder="Code (ex: K7QP)" maxlength="4">
        <input id="joinNameInput" placeholder="Ton pseudo">
        <button id="joinBtn" class="btn-primary">Rejoindre</button>
      </div>
      <div id="errorBox" class="error-box"></div>
    `;
    document.getElementById('createBtn').onclick = () => {
      const hostName = document.getElementById('hostNameInput').value.trim();
      if (!hostName) return showError('Entre un pseudo.');
      socket.emit('session:create', { hostName }, (res) => {
        if (res.error) return showError(res.error);
        me = { code: res.code, name: hostName, playerId: res.playerId, isHost: true };
        saveMe();
        state = { screen:'lobby', hostName, players: [] };
        render();
      });
    };
    document.getElementById('joinBtn').onclick = () => {
      const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
      const name = document.getElementById('joinNameInput').value.trim();
      if (!code || !name) return showError('Renseigne le code et ton pseudo.');
      socket.emit('session:join', { code, name }, (res) => {
        if (res.error) return showError(res.error);
        me = { code, name, playerId: res.playerId, isHost: false };
        saveMe();
        applySnapshot(res.snapshot);
      });
    };
  }

  function renderLobby(){
    const isHost = me.isHost;
    const players = state.players || [];
    app.innerHTML = `
      <div class="card paper">
        <div class="postmark">${postmarkSvg(me.code || '')}</div>
        <div class="muted" style="text-align:center;">Chef : ${escapeHtml(state.hostName || '')}</div>
        <h2 style="margin-top:18px;">Joueurs (${players.length})</h2>
        <ul class="player-list">
          ${players.map(p => `<li>${escapeHtml(p.name)}${p.connected ? '' : ' (déconnecté)'}</li>`).join('') || '<li class="muted">En attente de joueurs…</li>'}
        </ul>
        ${isHost
          ? `
            <label class="muted" style="display:block;margin:14px 0 4px;">Durée par question (secondes)</label>
            <input id="roundSecondsInput" type="number" min="5" max="120" value="30">
            <label class="muted" style="display:flex;align-items:center;gap:8px;margin:14px 0 4px;">
              <input id="carnetEnabledInput" type="checkbox" checked style="width:auto;margin:0;">
              Autoriser l'accès au carnet pendant la partie
            </label>
            <label class="muted" style="display:block;margin:14px 0 4px;">Qui note les réponses ?</label>
            <label class="muted" style="display:flex;align-items:center;gap:8px;margin:4px 0;">
              <input type="radio" name="gradingMode" value="host" checked style="width:auto;margin:0;">
              Le chef note
            </label>
            <label class="muted" style="display:flex;align-items:center;gap:8px;margin:4px 0;">
              <input type="radio" name="gradingMode" value="everyone" style="width:auto;margin:0;">
              Tout le monde vote (moyenne), même celui dont c'est la réponse
            </label>
            <label class="muted" style="display:flex;align-items:center;gap:8px;margin:4px 0 14px;">
              <input type="radio" name="gradingMode" value="peers" style="width:auto;margin:0;">
              Tout le monde vote (moyenne), sauf celui dont c'est la réponse
            </label>
            <label class="muted" style="display:flex;align-items:center;gap:8px;margin:4px 0 14px;">
              <input id="icebreakersEnabledInput" type="checkbox" style="width:auto;margin:0;">
              Pauses fun surprise entre les questions (à répondre dans le chat, en anglais)
            </label>
            <button id="startBtn" class="btn-primary">Lancer la partie</button>
          `
          : `<div class="muted">En attente que le chef lance la partie…</div>`}
        <div id="errorBox" class="error-box"></div>
      </div>
    `;
    if (isHost){
      document.getElementById('startBtn').onclick = () => {
        const roundSeconds = Number(document.getElementById('roundSecondsInput').value) || 30;
        const carnetEnabled = document.getElementById('carnetEnabledInput').checked;
        const gradingMode = document.querySelector('input[name="gradingMode"]:checked').value;
        const icebreakersEnabled = document.getElementById('icebreakersEnabledInput').checked;
        socket.emit('session:start', { code: me.code, roundSeconds, carnetEnabled, gradingMode, icebreakersEnabled }, (res) => {
          if (res && res.error) showError(res.error);
        });
      };
    }
  }

  function renderQuestion(){
    app.innerHTML = `
      <div class="card paper">
        <div class="round-label">Question ${state.roundIndex + 1} / ${state.totalRounds}</div>
        <div class="fr-phrase">${escapeHtml(state.fr)}</div>
        <div class="timer" id="timerDisplay">30s</div>
        <textarea id="answerInput" placeholder="Ta réponse en anglais…"></textarea>
        <button id="submitBtn" class="btn-primary">Envoyer</button>
        <div id="submitStatus" class="muted"></div>
      </div>
    `;
    document.getElementById('submitBtn').onclick = () => {
      const text = document.getElementById('answerInput').value;
      socket.emit('answer:submit', { code: me.code, text }, (res) => {
        const statusEl = document.getElementById('submitStatus');
        if (!statusEl) return;
        statusEl.textContent = (res && res.error) ? res.error : 'Réponse envoyée ✓';
      });
    };
    const tick = () => {
      const remainingMs = state.deadline - Date.now();
      const remaining = Math.max(0, Math.ceil(remainingMs / 1000));
      const timerEl = document.getElementById('timerDisplay');
      if (timerEl) timerEl.textContent = remaining + 's';
      if (remainingMs <= 0) clearInterval(countdownInterval);
    };
    tick();
    countdownInterval = setInterval(tick, 250);
  }

  function renderIcebreaker(){
    const hasTarget = !!state.targetPlayerId;
    const isTarget = hasTarget && state.targetPlayerId === me.playerId;
    app.innerHTML = `
      <div class="card paper">
        <div class="round-label">Pause fun 🎉</div>
        ${hasTarget ? `<div class="icebreaker-target">${isTarget ? "It's about YOU!" : escapeHtml(state.targetName)}</div>` : ''}
        <div class="icebreaker-text">${escapeHtml(state.text)}</div>
        <div class="icebreaker-hint">Réponds dans le chat, en anglais 🇬🇧 !</div>
        <div class="timer" id="timerDisplay"></div>
        ${me.isHost
          ? `<button id="icebreakerSkipBtn" class="btn-primary">Passer</button>`
          : `<div class="muted">La question suivante arrive dans quelques secondes…</div>`}
        <div id="errorBox" class="error-box"></div>
      </div>
    `;
    if (me.isHost){
      document.getElementById('icebreakerSkipBtn').onclick = () => {
        socket.emit('icebreaker:skip', { code: me.code }, (res) => {
          if (res && res.error) showError(res.error);
        });
      };
    }
    const tick = () => {
      const remainingMs = state.deadline - Date.now();
      const remaining = Math.max(0, Math.ceil(remainingMs / 1000));
      const timerEl = document.getElementById('timerDisplay');
      if (timerEl) timerEl.textContent = remaining + 's';
      if (remainingMs <= 0) clearInterval(countdownInterval);
    };
    tick();
    countdownInterval = setInterval(tick, 250);
  }

  function renderReview(){
    const isHost = me.isHost;
    const gradeLabel = { oui:'Oui ! ✓', presque:'Presque…', non:'Non ✗' };
    const gradeButtonsHtml = `
      <div class="grade-buttons">
        <button data-grade="oui" class="btn-grade ok">Oui (+3)</button>
        <button data-grade="presque" class="btn-grade warn">Presque (+1)</button>
        <button data-grade="non" class="btn-grade bad">Non (+0)</button>
      </div>
    `;
    const isVotingMode = state.gradingMode === 'peers' || state.gradingMode === 'everyone';
    const isAuthor = state.playerId === me.playerId;
    const authorExcluded = state.gradingMode === 'peers' && isAuthor;
    const votedPlayerIds = state.votedPlayerIds || [];
    const iHaveVoted = votedPlayerIds.includes(me.playerId);
    const finalized = state.points !== null && state.points !== undefined;

    let bodyExtra;
    if (finalized){
      const markLabel = isVotingMode ? `+${state.points} pt${state.points === 1 ? '' : 's'}` : gradeLabel[state.grade];
      const markClass = isVotingMode
        ? (state.points >= 2 ? 'grade-oui' : state.points >= 1 ? 'grade-presque' : 'grade-non')
        : `grade-${state.grade}`;
      bodyExtra = `<div class="grade-mark ${markClass}">${markLabel}</div>`;
    } else if (isVotingMode){
      if (authorExcluded){
        bodyExtra = `<div class="muted">Les autres joueurs notent ta réponse… (${votedPlayerIds.length} / ${state.votesNeeded})</div>`;
      } else if (iHaveVoted){
        bodyExtra = `<div class="muted">Vote enregistré. En attente des autres… (${votedPlayerIds.length} / ${state.votesNeeded})</div>`;
      } else {
        bodyExtra = gradeButtonsHtml;
      }
    } else {
      bodyExtra = isHost ? gradeButtonsHtml : `<div class="muted">Le chef est en train de noter…</div>`;
    }

    app.innerHTML = `
      <div class="card paper">
        <div class="round-label">Review — question ${state.roundIndex + 1} / ${state.totalRounds}</div>
        <div class="fr-phrase">${escapeHtml(state.fr)}</div>
        <div class="ref-answers">
          <span class="label">Réponses attendues</span>
          <div>${state.referenceAnswers.map(escapeHtml).join(' / ')}</div>
          ${state.native ? `<div class="muted" style="margin-top:6px;">À l'oral : ${escapeHtml(state.native)}</div>` : ''}
        </div>
        <div class="player-answer">
          <span class="label">${escapeHtml(state.playerName)} a répondu</span>
          <div class="answer-text">${state.answerText ? escapeHtml(state.answerText) : '(pas de réponse)'}</div>
        </div>
        ${bodyExtra}
        <div id="errorBox" class="error-box"></div>
      </div>
    `;
    app.querySelectorAll('.btn-grade').forEach(btn => {
      btn.onclick = () => {
        socket.emit('review:grade', { code: me.code, grade: btn.dataset.grade }, (res) => {
          if (res && res.error) showError(res.error);
        });
      };
    });
  }

  function renderFinished(){
    app.innerHTML = `
      <div class="card paper">
        <h2>Classement final</h2>
        <ol class="leaderboard">
          ${state.leaderboard.map((p, i) => `<li><span><span class="rank">#${i+1}</span>${escapeHtml(p.name)}</span><span class="score">${p.totalScore} pts</span></li>`).join('')}
        </ol>
        <button id="backHomeBtn" class="btn-primary">Nouvelle partie</button>
      </div>
    `;
    document.getElementById('backHomeBtn').onclick = () => {
      clearMe();
      state = { screen:'home' };
      render();
    };
  }

  (function init(){
    const saved = loadMe();
    if (saved && saved.code && saved.name && !saved.isHost){
      me = saved;
      socket.emit('session:rejoin', { code: me.code, name: me.name }, (res) => {
        if (res && res.error){
          clearMe();
          state = { screen:'home' };
          render();
        } else {
          me.playerId = res.playerId;
          saveMe();
          applySnapshot(res.snapshot);
        }
      });
    } else {
      state = { screen:'home' };
      render();
    }
  })();

})();
</script>
<script src="/carnet-widget.js"></script>
</body>
</html>
